<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>會議議程工具</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f2ec;
      --panel: #ffffff;
      --ink: #081263;
      --muted: #6b7280;
      --line: #d6cfc0;
      --brand: #081263;
      --brand-dark: #050a3f;
      --accent: #f8b500;
      --accent-dark: #c89100;
      --soft: #faf9f4;
      --danger: #b91c1c;
      --success: #166534;
      --radius: 4px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "KaiTi", "BiauKai", "DFKai-SB", "標楷體", "Noto Serif TC", serif;
      line-height: 1.5;
      overflow-x: hidden;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }

    .app {
      width: 100%;
      max-width: 920px;
      margin: 0 auto;
      padding-bottom: calc(88px + env(safe-area-inset-bottom));
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--brand);
      border-bottom: 4px solid var(--accent);
      color: #fff;
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 68px;
      padding: 12px 16px;
    }

    .brand {
      min-width: 0;
    }

    .brand strong {
      display: block;
      overflow: hidden;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      line-height: 1.2;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand span {
      display: block;
      margin-top: 2px;
      color: rgba(255, 255, 255, .62);
      font-size: 10px;
      letter-spacing: 2px;
      line-height: 1.2;
    }

    .steps {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 0 16px 12px;
      scrollbar-width: none;
    }

    .steps::-webkit-scrollbar {
      display: none;
    }

    .step-pill {
      flex: 0 0 auto;
      padding: 4px 10px;
      border: 1px solid rgba(255, 255, 255, .25);
      border-radius: 2px;
      color: rgba(255, 255, 255, .72);
      font-size: 12px;
      text-decoration: none;
      white-space: nowrap;
    }

    .step-pill.active {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--brand-dark);
      font-weight: 700;
    }

    .icon-btn {
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255, 255, 255, .32);
      border-radius: var(--radius);
      background: transparent;
      color: #fff;
    }

    .icon-btn:active,
    .primary:active,
    .secondary:active {
      transform: translateY(1px);
    }

    .hero {
      margin: 14px 12px 0;
      padding: 16px;
      border: 1px solid var(--line);
      border-left: 3px solid var(--brand);
      background: var(--panel);
    }

    h1 {
      margin: 0 0 14px;
      color: var(--brand);
      font-size: clamp(20px, 6vw, 30px);
      font-weight: 800;
      line-height: 1.18;
      letter-spacing: 1px;
      overflow-wrap: anywhere;
      word-break: break-all;
      max-width: 100%;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .meta-item {
      display: grid;
      grid-template-columns: 74px 1fr;
      gap: 10px;
      align-items: start;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
    }

    .meta-item:last-child {
      border-bottom: 0;
    }

    .meta-item span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .meta-item strong {
      color: var(--brand);
      font-size: 14px;
      font-weight: 700;
    }

    .quick-status {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 10px 12px 0;
    }

    .status-pill {
      min-height: 54px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--soft);
      text-align: center;
    }

    .status-pill b {
      display: block;
      color: var(--brand);
      font-size: 19px;
      line-height: 1;
    }

    .status-pill span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    main {
      padding: 12px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 0 10px;
    }

    .section-title h2 {
      margin: 0;
      color: var(--brand);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 2px;
    }

    .section-title h2::before {
      content: "";
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-right: 8px;
      background: var(--accent);
      vertical-align: -1px;
    }

    .agenda-card,
    .utility-panel {
      margin-bottom: 12px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-left: 3px solid var(--brand);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .agenda-head {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      width: 100%;
      min-height: 58px;
      padding: 12px;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      text-align: left;
    }

    .agenda-no {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 2px;
      background: var(--accent);
      color: var(--brand-dark);
      font-weight: 850;
    }

    .agenda-head strong {
      display: block;
      font-size: 16px;
      color: var(--brand);
      font-weight: 850;
      line-height: 1.25;
    }

    .agenda-head span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .chevron {
      color: var(--muted);
      font-size: 20px;
      transition: transform .18s ease;
    }

    .agenda-card[data-open="true"] .chevron {
      transform: rotate(180deg);
    }

    .agenda-body {
      display: none;
      padding: 12px;
    }

    .agenda-card[data-open="true"] .agenda-body {
      display: block;
    }

    .info {
      margin: 0 0 12px;
      padding: 10px;
      border-left: 4px solid var(--accent);
      background: #fef7e0;
      color: #6b5300;
      font-size: 13px;
    }

    label {
      display: block;
      margin: 13px 0 6px;
      color: var(--brand);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    textarea,
    input[type="text"],
    input[type="date"],
    input[type="time"] {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      font-size: 15px;
      outline: 0;
      display: block;
    }

    textarea {
      min-height: 112px;
      padding: 11px;
      resize: vertical;
      overflow-wrap: anywhere;
      overflow-x: hidden;
    }

    textarea[rows="2"] {
      min-height: 72px;
    }

    input[type="text"],
    input[type="date"],
    input[type="time"] {
      padding: 0 11px;
    }

    textarea:focus,
    input:focus {
      border-color: var(--accent);
      box-shadow: none;
    }

    .decision-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }

    .secondary,
    .primary,
    .danger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 44px;
      padding: 0 12px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 1px;
      text-decoration: none;
      white-space: nowrap;
    }

    .primary {
      border: 1px solid var(--brand);
      background: var(--brand);
      color: #fff;
    }

    .secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--brand);
    }

    .primary.export {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--brand-dark);
    }

    .danger {
      border: 1px solid #edd0d0;
      background: #fff5f5;
      color: var(--danger);
    }

    .attendees {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .attendee {
      position: relative;
      display: block;
    }

    .attendee input {
      position: absolute;
      inset: 0;
      opacity: 0;
    }

    .attendee span {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--muted);
      font-weight: 800;
    }

    .attendee input:checked + span {
      border-color: var(--brand);
      background: #fef7e0;
      color: var(--brand);
    }

    .task-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .task-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      min-height: 48px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--soft);
    }

    .task-row input[type="checkbox"] {
      width: 22px;
      height: 22px;
      accent-color: var(--brand);
    }

    .task-row input[type="text"] {
      min-height: 38px;
      border: 0;
      background: transparent;
      padding: 0;
    }

    .utility-panel {
      padding: 12px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      min-width: 0;
    }

    .inline-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      min-width: 0;
    }

    .form-grid > *,
    .inline-fields > * {
      min-width: 0;
    }

    .proposal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .bottom-actions {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 30;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, .95);
      backdrop-filter: blur(16px);
    }

    .bottom-inner {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 920px;
      margin: 0 auto;
      min-width: 0;
    }

    .bottom-inner > button {
      min-width: 0;
    }

    .toast {
      position: fixed;
      right: 14px;
      bottom: calc(82px + env(safe-area-inset-bottom));
      left: 14px;
      z-index: 40;
      display: none;
      max-width: 520px;
      margin: 0 auto;
      padding: 12px 14px;
      border-radius: var(--radius);
      background: var(--brand-dark);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      text-align: center;
      box-shadow: 0 10px 28px rgba(8, 18, 99, .18);
    }

    .toast[data-show="true"] {
      display: block;
    }

    @media (min-width: 680px) {
      .hero,
      main,
      .quick-status {
        margin-right: 20px;
        margin-left: 20px;
        padding-right: 20px;
        padding-left: 20px;
      }

      .meta-grid {
        grid-template-columns: 1fr 1fr;
      }

      .meta-item:nth-last-child(2) {
        border-bottom: 0;
      }

      .agenda-body {
        padding: 16px;
      }
    }

    @media (max-width: 520px) {
      .app {
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
        padding-bottom: calc(140px + env(safe-area-inset-bottom));
      }

      .topbar-inner {
        min-height: 60px;
      }

      .hero {
        width: min(360px, calc(100vw - 24px));
        max-width: none;
        margin-right: auto;
        margin-left: auto;
        margin-top: 12px;
        padding: 14px;
      }

      main,
      .quick-status {
        width: min(360px, calc(100vw - 24px));
        max-width: 360px;
        margin-right: auto;
        margin-left: auto;
      }

      main {
        padding-right: 0;
        padding-left: 0;
      }

      .quick-status {
        padding-right: 0;
        padding-left: 0;
      }

      h1 {
        font-size: 25px;
        line-height: 1.22;
      }

      textarea {
        min-height: 96px;
      }

      textarea[rows="2"] {
        min-height: 70px;
      }

      .inline-fields {
        grid-template-columns: 1fr;
      }

      .inline-fields.short-fields {
        grid-template-columns: 1fr;
      }

      .hero,
      .utility-panel,
      .agenda-card,
      .form-grid,
      .inline-fields,
      .bottom-actions,
      .bottom-inner,
      input,
      textarea,
      button {
        max-width: 100%;
      }

      .decision-row {
        grid-template-columns: 1fr;
      }

      .bottom-actions {
        padding-right: 8px;
        padding-left: 8px;
      }

      .bottom-inner {
        width: min(360px, calc(100vw - 16px));
        max-width: 360px;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .secondary,
      .primary,
      .danger {
        min-height: 42px;
        padding: 0 6px;
        font-size: 12px;
        letter-spacing: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <strong>會議議程工具</strong>
          <span>MEETING AGENDA / MINUTES</span>
        </div>
        <button class="icon-btn" type="button" id="expandAll" aria-label="展開全部" title="展開全部">□</button>
      </div>
      <nav class="steps" aria-label="快速跳轉">
        <a class="step-pill active" href="#meetingInfo">1 會議資訊</a>
        <a class="step-pill" href="#agenda">2 討論提案</a>
        <a class="step-pill" href="#output">3 複製匯出</a>
      </nav>
    </header>

    <section class="hero" id="meetingInfo">
      <h1>剛剛好室內裝修有限公司<br><span id="meetingTopicTitle">主管會議</span></h1>
      <div class="form-grid">
        <div class="inline-fields short-fields">
          <div>
            <label for="meetingYear">年度</label>
            <input id="meetingYear" type="text" data-save="meeting.year" placeholder="115">
          </div>
          <div>
            <label for="meetingNumber">第__次</label>
            <input id="meetingNumber" type="text" data-save="meeting.number" placeholder="20">
          </div>
        </div>
        <div>
          <label for="meetingDate">會議日期</label>
          <input id="meetingDate" type="date" data-save="meeting.date">
        </div>
        <div class="inline-fields short-fields">
          <div>
            <label for="meetingStartTime">開始時間</label>
            <input id="meetingStartTime" type="time" data-save="meeting.startTime">
          </div>
          <div>
            <label for="meetingEndTime">結束時間</label>
            <input id="meetingEndTime" type="time" data-save="meeting.endTime">
          </div>
        </div>
        <div>
          <label for="meetingLocation">會議地點</label>
          <textarea id="meetingLocation" data-save="meeting.location" rows="2" placeholder="三和鋁業有限公司（屏東縣東港鎮船頭里大順路180號）"></textarea>
        </div>
        <div>
          <label for="meetingTopic">會議主題</label>
          <input id="meetingTopic" type="text" data-save="meeting.topic" placeholder="主管會議">
        </div>
        <div class="inline-fields">
          <div>
            <label for="meetingAttendees">出席人員</label>
            <textarea id="meetingAttendees" data-save="meeting.attendees" rows="2" placeholder="王品超、陳憲君、羅文彥、林哲緯"></textarea>
          </div>
          <div>
            <label for="meetingRecorder">記錄</label>
            <input id="meetingRecorder" type="text" data-save="meeting.recorder" placeholder="陳憲君">
          </div>
        </div>
      </div>
    </section>

    <section class="quick-status" aria-label="會議狀態">
      <div class="status-pill">
        <b id="proposalCount">0</b>
        <span>案由</span>
      </div>
      <div class="status-pill">
        <b id="filledCount">0</b>
        <span>已填</span>
      </div>
      <div class="status-pill">
        <b id="agendaReady">0</b>
        <span>可匯出</span>
      </div>
    </section>

    <main>
      <section class="utility-panel" id="agenda" aria-labelledby="agendaTitle">
        <div class="section-title" style="margin-top: 0;">
          <h2 id="agendaTitle">討論提案</h2>
          <button class="secondary" type="button" id="addProposal">新增案由</button>
        </div>
        <div id="proposalList"></div>
      </section>
    </main>
  </div>

  <div class="bottom-actions" id="output" role="toolbar" aria-label="議程操作">
    <div class="bottom-inner">
      <button class="secondary" type="button" id="copyMinutes">複製</button>
      <button class="primary export" type="button" id="exportWord">Word</button>
      <button class="secondary" type="button" id="exportPdf">PDF</button>
      <button class="danger" type="button" id="clearData">清空</button>
    </div>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "mobile-agenda-builder-v1";
    const defaultState = {
      meeting: {
        year: "115",
        number: "20",
        date: "2026-06-14",
        startTime: "16:30",
        endTime: "17:30",
        location: "三和鋁業有限公司（屏東縣東港鎮船頭里大順路180號）",
        attendees: "王品超、陳憲君、羅文彥、林哲緯",
        topic: "主管會議",
        recorder: "陳憲君"
      },
      proposals: [
        {
          id: createId(),
          title: "各案件進度報告",
          description: "依據案件列表，逐案報告各案件的進度，近期幾件需要特別提出討論，如附件一。"
        },
        {
          id: createId(),
          title: "人資事宜",
          description: "新增職缺「工務行政助理」及調整職缺「管理部專員」，初稿如附件二。"
        }
      ]
    };

    let state = loadState();

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        return {
          ...JSON.parse(JSON.stringify(defaultState)),
          ...saved,
          meeting: { ...defaultState.meeting, ...(saved.meeting || {}) },
          proposals: Array.isArray(saved.proposals) && saved.proposals.length
            ? saved.proposals
            : JSON.parse(JSON.stringify(defaultState.proposals))
        };
      } catch (error) {
        return JSON.parse(JSON.stringify(defaultState));
      }
    }

    function createId() {
      return `id-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      updateStats();
    }

    function byPath(path, value) {
      const parts = path.split(".");
      let cursor = state;
      while (parts.length > 1) {
        const part = parts.shift();
        cursor[part] = cursor[part] || {};
        cursor = cursor[part];
      }
      if (value !== undefined) {
        cursor[parts[0]] = value;
      }
      return cursor[parts[0]] || "";
    }

    function showToast(text) {
      const toast = document.getElementById("toast");
      toast.textContent = text;
      toast.dataset.show = "true";
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        toast.dataset.show = "false";
      }, 1800);
    }

    function escapeAttr(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll('"', "&quot;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function updateStats() {
      const meetingFields = Object.values(state.meeting).filter((value) => String(value || "").trim()).length;
      const filledProposals = state.proposals.filter((proposal) => proposal.title.trim() || proposal.description.trim()).length;
      document.getElementById("proposalCount").textContent = state.proposals.length;
      document.getElementById("filledCount").textContent = meetingFields + filledProposals;
      document.getElementById("agendaReady").textContent = state.meeting.year && state.meeting.number ? "1" : "0";
    }

    function buildAgendaText() {
      const meeting = state.meeting;
      const title = `剛剛好室內裝修有限公司${meeting.year || "__"}年度第 ${meeting.number || "__"} 次${meeting.topic || "會議"} 議程`;
      const meetingTime = [meeting.startTime, meeting.endTime].filter(Boolean).join("-");
      const lines = [
        title,
        "",
        `壹、會議日期：${formatRocDate(meeting.date)}`,
        "",
        `貳、會議時間：${meetingTime}`,
        "",
        `參、會議地點：${meeting.location || ""}`,
        "",
        `肆、出席人員：${meeting.attendees || ""}        記錄：${meeting.recorder || ""}`,
        "",
        "伍、討論提案："
      ];

      state.proposals.forEach((proposal, index) => {
        lines.push("");
        lines.push(`    案由${numberToChinese(index + 1)}：${proposal.title || ""}`);
        lines.push(`    說明：${proposal.description || ""}`);
        lines.push("    決議：");
        lines.push("");
      });

      lines.push("陸、主管交辦");
      lines.push("");
      lines.push("柒、臨時動議");
      lines.push("");
      lines.push("捌、散會時間：");
      return lines.join("\n");
    }

    function formatRocDate(dateValue) {
      if (!dateValue) return "";
      const date = new Date(`${dateValue}T00:00:00`);
      if (Number.isNaN(date.getTime())) return dateValue;
      const weekdays = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
      const year = date.getFullYear() - 1911;
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}年 ${month} 月 ${day} 日 ${weekdays[date.getDay()]}`;
    }

    function numberToChinese(number) {
      const digits = ["零", "一", "二", "三", "四", "五", "六", "七", "八", "九", "十"];
      if (number <= 10) return digits[number];
      if (number < 20) return `十${digits[number - 10]}`;
      return String(number);
    }

    function buildAgendaHtml() {
      const meeting = state.meeting;
      const meetingTime = [meeting.startTime, meeting.endTime].filter(Boolean).join("-");
      const proposalHtml = state.proposals.map((proposal, index) => `
        <div class="proposal">
          <p><strong>案由${numberToChinese(index + 1)}：</strong>${escapeHtml(proposal.title || "")}</p>
          <p><strong>說明：</strong>${escapeHtml(proposal.description || "")}</p>
          <p><strong>決議：</strong></p>
        </div>
      `).join("");

      return `<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>${escapeHtml(fileBaseName())}</title>
  <style>
    @page { size: A4; margin: 2cm; }
    body {
      color: #000;
      font-family: "KaiTi", "BiauKai", "DFKai-SB", "標楷體", "Noto Serif TC", serif;
      font-size: 12pt;
      line-height: 1.7;
    }
    h1 {
      margin: 0 0 18pt;
      text-align: center;
      font-size: 18pt;
      line-height: 1.35;
    }
    p { margin: 0 0 8pt; }
    .section { margin: 10pt 0 6pt; font-weight: 700; }
    .proposal { margin: 0 0 12pt 24pt; }
    .people-line {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24pt;
    }
  </style>
</head>
<body>
  <h1>剛剛好室內裝修有限公司${escapeHtml(meeting.year || "__")}年度第 ${escapeHtml(meeting.number || "__")} 次${escapeHtml(meeting.topic || "會議")} 議程</h1>
  <p class="section">壹、會議日期：${escapeHtml(formatRocDate(meeting.date))}</p>
  <p class="section">貳、會議時間：${escapeHtml(meetingTime)}</p>
  <p class="section">參、會議地點：${escapeHtml(meeting.location || "")}</p>
  <p class="section people-line"><span>肆、出席人員：${escapeHtml(meeting.attendees || "")}</span><span>記錄：${escapeHtml(meeting.recorder || "")}</span></p>
  <p class="section">伍、討論提案：</p>
  ${proposalHtml}
  <p class="section">陸、主管交辦</p>
  <p class="section">柒、臨時動議</p>
  <p class="section">捌、散會時間：</p>
</body>
</html>`;
    }

    function fileBaseName() {
      const year = state.meeting.year || "年度";
      const number = state.meeting.number || "次";
      const topic = state.meeting.topic || "會議";
      return sanitizeFileName(`剛剛好${year}年度第${number}次${topic}議程`);
    }

    function sanitizeFileName(name) {
      return String(name || "會議議程")
        .replace(/[\\/:*?"<>|]/g, "")
        .replace(/\s+/g, "")
        .trim() || "會議議程";
    }

    function buildDocxBlob() {
      const documentXml = buildDocxDocumentXml();
      const files = {
        "[Content_Types].xml": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
  <Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>
</Types>`,
        "_rels/.rels": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`,
        "word/_rels/document.xml.rels": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"/>`,
        "word/styles.xml": buildDocxStylesXml(),
        "word/document.xml": documentXml
      };
      return new Blob([createZip(files)], {
        type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
      });
    }

    function buildDocxDocumentXml() {
      const meeting = state.meeting;
      const meetingTime = [meeting.startTime, meeting.endTime].filter(Boolean).join("-");
      const title = `剛剛好室內裝修有限公司${meeting.year || "__"}年度第 ${meeting.number || "__"} 次${meeting.topic || "會議"} 議程`;
      const paragraphs = [
        docxParagraph(title, { bold: true, align: "center", size: 36 }),
        docxParagraph(`壹、會議日期：${formatRocDate(meeting.date)}`),
        docxParagraph(`貳、會議時間：${meetingTime}`),
        docxParagraph(`參、會議地點：${meeting.location || ""}`),
        docxParagraph(`肆、出席人員：${meeting.attendees || ""}        記錄：${meeting.recorder || ""}`),
        docxParagraph("伍、討論提案：")
      ];

      state.proposals.forEach((proposal, index) => {
        paragraphs.push(docxParagraph(`案由${numberToChinese(index + 1)}：${proposal.title || ""}`, { indent: 420 }));
        paragraphs.push(docxParagraph(`說明：${proposal.description || ""}`, { indent: 420 }));
        paragraphs.push(docxParagraph("決議：", { indent: 420 }));
      });

      paragraphs.push(
        docxParagraph("陸、主管交辦"),
        docxParagraph("柒、臨時動議"),
        docxParagraph("捌、散會時間：")
      );

      return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:body>
    ${paragraphs.join("\n")}
    <w:sectPr>
      <w:pgSz w:w="11906" w:h="16838"/>
      <w:pgMar w:top="1440" w:right="1440" w:bottom="1440" w:left="1440" w:header="720" w:footer="720" w:gutter="0"/>
    </w:sectPr>
  </w:body>
</w:document>`;
    }

    function buildDocxStylesXml() {
      return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:style w:type="paragraph" w:default="1" w:styleId="Normal">
    <w:name w:val="Normal"/>
    <w:rPr>
      <w:rFonts w:ascii="KaiTi" w:hAnsi="KaiTi" w:eastAsia="KaiTi" w:cs="BiauKai"/>
      <w:sz w:val="24"/>
      <w:szCs w:val="24"/>
    </w:rPr>
  </w:style>
</w:styles>`;
    }

    function docxParagraph(text, options = {}) {
      const align = options.align ? `<w:jc w:val="${options.align}"/>` : "";
      const indent = options.indent ? `<w:ind w:left="${options.indent}"/>` : "";
      const bold = options.bold ? "<w:b/><w:bCs/>" : "";
      const size = options.size || 24;
      return `<w:p>
  <w:pPr>${align}${indent}<w:spacing w:after="160"/></w:pPr>
  <w:r>
    <w:rPr><w:rFonts w:ascii="KaiTi" w:hAnsi="KaiTi" w:eastAsia="KaiTi" w:cs="BiauKai"/>${bold}<w:sz w:val="${size}"/><w:szCs w:val="${size}"/></w:rPr>
    <w:t xml:space="preserve">${escapeXml(text)}</w:t>
  </w:r>
</w:p>`;
    }

    function escapeXml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&apos;");
    }

    function createZip(files) {
      const encoder = new TextEncoder();
      const localParts = [];
      const centralParts = [];
      let offset = 0;
      const now = new Date();
      const dosTime = ((now.getHours() & 31) << 11) | ((now.getMinutes() & 63) << 5) | ((now.getSeconds() / 2) & 31);
      const dosDate = (((now.getFullYear() - 1980) & 127) << 9) | (((now.getMonth() + 1) & 15) << 5) | (now.getDate() & 31);

      Object.entries(files).forEach(([name, content]) => {
        const nameBytes = encoder.encode(name);
        const data = encoder.encode(content);
        const crc = crc32(data);
        const local = concatUint8([
          u32(0x04034b50), u16(20), u16(0), u16(0), u16(dosTime), u16(dosDate),
          u32(crc), u32(data.length), u32(data.length), u16(nameBytes.length), u16(0),
          nameBytes, data
        ]);
        localParts.push(local);
        centralParts.push(concatUint8([
          u32(0x02014b50), u16(20), u16(20), u16(0), u16(0), u16(dosTime), u16(dosDate),
          u32(crc), u32(data.length), u32(data.length), u16(nameBytes.length), u16(0),
          u16(0), u16(0), u16(0), u32(0), u32(offset), nameBytes
        ]));
        offset += local.length;
      });

      const central = concatUint8(centralParts);
      const end = concatUint8([
        u32(0x06054b50), u16(0), u16(0), u16(Object.keys(files).length), u16(Object.keys(files).length),
        u32(central.length), u32(offset), u16(0)
      ]);
      return concatUint8([...localParts, central, end]);
    }

    function crc32(bytes) {
      let crc = -1;
      for (let i = 0; i < bytes.length; i++) {
        crc = (crc >>> 8) ^ crcTable[(crc ^ bytes[i]) & 255];
      }
      return (crc ^ -1) >>> 0;
    }

    const crcTable = Array.from({ length: 256 }, (_, n) => {
      let c = n;
      for (let k = 0; k < 8; k++) c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
      return c >>> 0;
    });

    function u16(value) {
      return new Uint8Array([value & 255, (value >>> 8) & 255]);
    }

    function u32(value) {
      return new Uint8Array([value & 255, (value >>> 8) & 255, (value >>> 16) & 255, (value >>> 24) & 255]);
    }

    function concatUint8(parts) {
      const total = parts.reduce((sum, part) => sum + part.length, 0);
      const output = new Uint8Array(total);
      let offset = 0;
      parts.forEach((part) => {
        output.set(part, offset);
        offset += part.length;
      });
      return output;
    }

    function hydrateInputs() {
      document.querySelectorAll("[data-save]").forEach((input) => {
        input.value = byPath(input.dataset.save);
        input.oninput = () => {
          byPath(input.dataset.save, input.value);
          if (input.dataset.save === "meeting.topic") updateDynamicTitles();
          saveState();
        };
      });
      updateDynamicTitles();
    }

    function updateDynamicTitles() {
      const topic = state.meeting.topic || "會議";
      const title = document.getElementById("meetingTopicTitle");
      if (title) title.textContent = topic;
      document.title = `會議議程工具 - ${topic}`;
    }

    function renderProposals() {
      const list = document.getElementById("proposalList");
      list.innerHTML = state.proposals.map((proposal, index) => `
        <article class="agenda-card" data-proposal-index="${index}">
          <button class="agenda-head" type="button" aria-expanded="true">
            <span class="agenda-no">${index + 1}</span>
            <span>
              <strong>案由${numberToChinese(index + 1)}</strong>
              <span>${escapeHtml(proposal.title || "尚未填寫案由")}</span>
            </span>
            <span class="chevron">⌄</span>
          </button>
          <div class="agenda-body" style="display: block;">
            <label for="proposal-title-${index}">案由${numberToChinese(index + 1)}</label>
            <input id="proposal-title-${index}" type="text" value="${escapeAttr(proposal.title)}" data-proposal-field="title" placeholder="例如：各案件進度報告">
            <label for="proposal-desc-${index}">說明</label>
            <textarea id="proposal-desc-${index}" data-proposal-field="description" placeholder="輸入本案說明">${escapeHtml(proposal.description)}</textarea>
            <div class="proposal-actions">
              <button class="danger" type="button" data-delete-proposal>刪除</button>
            </div>
          </div>
        </article>
      `).join("");
      updateStats();
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    document.getElementById("addProposal").addEventListener("click", () => {
      state.proposals.push({
        id: createId(),
        title: "",
        description: ""
      });
      saveState();
      renderProposals();
      document.querySelector(`[data-proposal-index="${state.proposals.length - 1}"] input`)?.focus();
    });

    document.getElementById("proposalList").addEventListener("input", (event) => {
      const card = event.target.closest("[data-proposal-index]");
      const field = event.target.dataset.proposalField;
      if (!card || !field) return;
      state.proposals[Number(card.dataset.proposalIndex)][field] = event.target.value;
      saveState();
    });

    document.getElementById("proposalList").addEventListener("click", (event) => {
      const head = event.target.closest(".agenda-head");
      if (head) {
        const body = head.parentElement.querySelector(".agenda-body");
        const isOpen = body.style.display !== "none";
        body.style.display = isOpen ? "none" : "block";
        head.setAttribute("aria-expanded", String(!isOpen));
        head.parentElement.dataset.open = String(!isOpen);
      }

      const deleteButton = event.target.closest("[data-delete-proposal]");
      if (!deleteButton) return;
      const card = event.target.closest("[data-proposal-index]");
      if (state.proposals.length === 1) {
        showToast("至少保留一個案由");
        return;
      }
      state.proposals.splice(Number(card.dataset.proposalIndex), 1);
      saveState();
      renderProposals();
    });

    document.getElementById("expandAll").addEventListener("click", () => {
      const cards = [...document.querySelectorAll(".agenda-card")];
      const shouldOpen = cards.some((card) => card.querySelector(".agenda-body")?.style.display === "none");
      cards.forEach((card) => {
        card.dataset.open = String(shouldOpen);
        const body = card.querySelector(".agenda-body");
        if (body) body.style.display = shouldOpen ? "block" : "none";
        card.querySelector(".agenda-head")?.setAttribute("aria-expanded", String(shouldOpen));
      });
    });

    document.getElementById("copyMinutes").addEventListener("click", async () => {
      const minutes = buildAgendaText();
      try {
        await navigator.clipboard.writeText(minutes);
        showToast("議程已複製");
      } catch (error) {
        showToast("瀏覽器不允許複製，請改用匯出");
      }
    });

    document.getElementById("exportWord").addEventListener("click", () => {
      const blob = buildDocxBlob();
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `${fileBaseName()}.docx`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showToast("已匯出 DOCX");
    });

    document.getElementById("exportPdf").addEventListener("click", () => {
      const frame = document.createElement("iframe");
      frame.style.position = "fixed";
      frame.style.right = "0";
      frame.style.bottom = "0";
      frame.style.width = "0";
      frame.style.height = "0";
      frame.style.border = "0";
      document.body.appendChild(frame);
      const doc = frame.contentDocument || frame.contentWindow.document;
      doc.open();
      doc.write(buildAgendaHtml());
      doc.close();
      window.setTimeout(() => {
        frame.contentWindow.focus();
        frame.contentWindow.print();
        window.setTimeout(() => frame.remove(), 1000);
      }, 250);
      showToast("請在列印視窗選擇儲存為 PDF");
    });

    document.getElementById("clearData").addEventListener("click", () => {
      if (!confirm("清空目前填寫的議程？")) return;
      localStorage.removeItem(STORAGE_KEY);
      state = loadState();
      hydrateInputs();
      renderProposals();
      showToast("已清空");
    });

    hydrateInputs();
    renderProposals();
    updateStats();
  </script>
</body>
</html>
